services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=dahticket
      - DB_PORT=5432
      - JWT_SECRET=change-me-to-a-secure-random-string-in-production
      # SMTP Configuration (uncomment and fill to enable email notifications)
      # - SMTP_HOST=smtp.office365.com
      # - SMTP_PORT=587
      # - SMTP_USERNAME=your-outlook-email@company.com
      # - SMTP_PASSWORD=your-app-password
      # - SMTP_FROM_NAME=DahTicket IT Support
      # - SMTP_FROM_ADDR=noreply@company.com
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dahticket-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    networks:
      - dahticket-network
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=dahticket
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dahticket-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@dahticket.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - dahticket-network
    restart: unless-stopped

networks:
  dahticket-network:
    driver: bridge

volumes:
  postgres_data:
  backend_uploads:
