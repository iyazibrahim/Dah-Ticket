# Production / Dokploy deployment
#
# Usage:
#   cp .env.production.example .env
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# Dokploy: set the same variables in the Dokploy env panel and deploy this file.
# Ensure dokploy-network exists on the host (Dokploy creates it automatically).

name: dahticket-prod

services:
  db:
    image: postgres:15-alpine
    container_name: dahticket-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dahticket-backend
    environment:
      PORT: ${PORT:-8080}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      SLA_LOW_HOURS: ${SLA_LOW_HOURS:-48}
      SLA_MEDIUM_HOURS: ${SLA_MEDIUM_HOURS:-24}
      SLA_HIGH_HOURS: ${SLA_HIGH_HOURS:-8}
      SLA_CRITICAL_HOURS: ${SLA_CRITICAL_HOURS:-2}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: dahticket-frontend
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - internal
      - dokploy-network
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  postgres_data:
  backend_uploads:
